<!-- Tarjeta de espacio académico -->
<div class="card">

  <!-- Imagen representativa del espacio (tarea i). Si falla, muestra un marcador -->
  <div class="card-media">
    <img *ngIf="!imagenFallo" [src]="espacio.imagen" [alt]="espacio.nombre"
         class="card-img" (error)="onImagenError()">
    <div *ngIf="imagenFallo" class="card-img-fallback" aria-hidden="true">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"></rect>
        <circle cx="9" cy="9" r="2"></circle>
        <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"></path>
      </svg>
    </div>

    <!-- Badge de tipo sobre la imagen -->
    <span class="card-tipo">{{ espacio.tipo }}</span>
  </div>

  <div class="card-body">
    <h3 class="card-title">{{ espacio.nombre }}</h3>

    <!-- Datos del espacio -->
    <ul class="card-meta">
      <li><span>Capacidad</span><strong>{{ espacio.capacidad }} personas</strong></li>
      <li><span>Ubicación</span><strong>{{ espacio.ubicacion }}</strong></li>
    </ul>

    <!-- Badge de alta capacidad (con icono SVG, no emoji) -->
    <span class="alta-capacidad" *ngIf="espacio.capacidad > 50">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"
           stroke="currentColor" stroke-width="1" stroke-linejoin="round" aria-hidden="true">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
      </svg>
      Alta capacidad
    </span>

    <!-- Nueva lógica: todos los espacios son reservables. La disponibilidad
         real (por fecha y hora) se comprueba en el formulario. -->
    <button class="btn-seleccionar" (click)="seleccionar()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="4" width="18" height="18" rx="2"></rect>
        <line x1="16" y1="2" x2="16" y2="6"></line>
        <line x1="8" y1="2" x2="8" y2="6"></line>
        <line x1="3" y1="10" x2="21" y2="10"></line>
      </svg>
      Reservar
    </button>
  </div>
</div>
